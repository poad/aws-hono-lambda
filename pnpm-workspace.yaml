packages:
  - ./cdk
  - ./app

allowBuilds:
  esbuild: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

minimumReleaseAgeExclude:
  - hono@4.12.18
  - ws@8.20.1

overrides:
  chokidar: '>=5'
  eslint-import-resolver-typescript: '^4.4.4'
  hono@<4.12.18: ^4.12.18
  semver: '>=7'
  ws@>=8.0.0 <8.20.1: ^8.20.1

trustPolicy: no-downgrade
